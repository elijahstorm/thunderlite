# Local dev stack. Auth, database, and file storage are DontCode platform
# services — there is no local stand-in for them. Set DONTCODE_API_URL and
# DONTCODE_API_KEY in .env.local (see .env.example); only ephemeral pieces
# (KV game-session state, chat broadcaster) run locally.
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - '127.0.0.1:${APP_HOST_PORT:-15173}:5173'
    env_file:
      - .env.local
    environment:
      CI: 'true'
      NODE_ENV: development
      KV_REST_API_URL: http://kv:80
      KV_REST_API_TOKEN: example_token
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
    depends_on:
      kv:
        condition: service_started

  chat:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: ['pnpm', 'chat']
    ports:
      - '127.0.0.1:${CHAT_HOST_PORT:-18083}:8083'
    environment:
      CI: 'true'
      CHAT_PORT: 8083
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data

  kv:
    image: hiett/serverless-redis-http:latest
    environment:
      SRH_MODE: env
      SRH_TOKEN: example_token
      SRH_CONNECTION_STRING: redis://redis:6379
    ports:
      - '127.0.0.1:${KV_HOST_PORT:-180}:80'
    depends_on:
      - redis

volumes:
  app_node_modules:
  redisdata:
