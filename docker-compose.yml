# Local dev stack. Auth, database, and file storage are DontCode platform
# services; for local dev run the bundled mock gateway on your host
# (`pnpm mock`, see .env.example) and this stack reaches it automatically.
# DONTCODE_API_KEY comes from .env.local; only ephemeral pieces (KV
# game-session state, chat broadcaster) run as containers here.
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - '127.0.0.1:${APP_HOST_PORT:-15173}:5173'
    env_file:
      - .env.local
    environment:
      CI: 'true'
      NODE_ENV: development
      KV_REST_API_URL: http://kv:80
      KV_REST_API_TOKEN: example_token
      # The mock gateway runs on the host (`pnpm mock`); from inside the
      # container the host is `host.docker.internal`, not localhost. This
      # overrides whatever DONTCODE_API_URL is set in .env.local.
      DONTCODE_API_URL: http://host.docker.internal:${DONTCODE_MOCK_HOST_PORT:-4000}
    extra_hosts:
      # Make host.docker.internal resolve on Linux engines too (Docker
      # Desktop already provides it).
      - 'host.docker.internal:host-gateway'
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
    depends_on:
      kv:
        condition: service_started

  chat:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: ['pnpm', 'chat']
    ports:
      - '127.0.0.1:${CHAT_HOST_PORT:-18083}:8083'
    environment:
      CI: 'true'
      CHAT_PORT: 8083
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data

  kv:
    image: hiett/serverless-redis-http:latest
    environment:
      SRH_MODE: env
      SRH_TOKEN: example_token
      SRH_CONNECTION_STRING: redis://redis:6379
    ports:
      - '127.0.0.1:${KV_HOST_PORT:-180}:80'
    depends_on:
      - redis

volumes:
  app_node_modules:
  redisdata:
