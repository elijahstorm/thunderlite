services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - '127.0.0.1:${APP_HOST_PORT:-5173}:5173'
    env_file:
      - .env.local
    environment:
      NODE_ENV: development
      POSTGRES_URL: postgres://thunderlite:thunderlite@db:5432/thunderlite
      KV_REST_API_URL: http://kv:80
      KV_REST_API_TOKEN: example_token
      HANKO_API_URL_INTERNAL: http://hanko:8000
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
    depends_on:
      db:
        condition: service_healthy
      kv:
        condition: service_started
      hanko:
        condition: service_started

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: thunderlite
      POSTGRES_PASSWORD: thunderlite
      POSTGRES_DB: thunderlite
    ports:
      - '127.0.0.1:${POSTGRES_HOST_PORT:-55432}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U thunderlite -d thunderlite']
      interval: 5s
      timeout: 3s
      retries: 5

  chat:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: ['pnpm', 'chat']
    ports:
      - '127.0.0.1:${CHAT_HOST_PORT:-8083}:8083'
    environment:
      CHAT_PORT: 8083
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data

  kv:
    image: hiett/serverless-redis-http:latest
    environment:
      SRH_MODE: env
      SRH_TOKEN: example_token
      SRH_CONNECTION_STRING: redis://redis:6379
    ports:
      - '127.0.0.1:${KV_HOST_PORT:-58079}:80'
    depends_on:
      - redis

  hanko-init:
    image: postgres:16-alpine
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: thunderlite
    entrypoint: ['sh', '-c']
    command:
      - >
        psql -h db -U thunderlite -tc "SELECT 1 FROM pg_database WHERE datname='hanko'" | grep -q 1
        || psql -h db -U thunderlite -c "CREATE DATABASE hanko"
    restart: 'no'

  hanko-migrate:
    image: ghcr.io/teamhanko/hanko:latest
    depends_on:
      hanko-init:
        condition: service_completed_successfully
    volumes:
      - ./hanko/config.yaml:/etc/config/config.yaml:ro
    command: ['--config', '/etc/config/config.yaml', 'migrate', 'up']
    restart: 'no'

  hanko:
    image: ghcr.io/teamhanko/hanko:latest
    depends_on:
      hanko-migrate:
        condition: service_completed_successfully
      mailpit:
        condition: service_started
    volumes:
      - ./hanko/config.yaml:/etc/config/config.yaml:ro
    command: ['serve', '--config', '/etc/config/config.yaml', 'public']
    ports:
      - '127.0.0.1:${HANKO_HOST_PORT:-8000}:8000'

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - '127.0.0.1:${MAIL_HOST_PORT:-8025}:8025'

volumes:
  app_node_modules:
  pgdata:
  redisdata:
