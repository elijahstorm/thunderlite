service:
  name: ThunderLite Authentication

database:
  user: thunderlite
  password: thunderlite
  host: db
  port: '5432'
  database: hanko
  dialect: postgres

secrets:
  keys:
    - thunderlite-dev-jwt-not-for-production-please-change

server:
  public:
    address: ':8000'
    cors:
      allow_origins:
        - http://localhost:15173
        - http://localhost:15174
      allow_credentials: true

webauthn:
  relying_party:
    id: localhost
    display_name: ThunderLite (dev)
    origins:
      - http://localhost:15173
      - http://localhost:15174

session:
  cookie:
    secure: false
    same_site: lax

email:
  enabled: true
  use_for_authentication: false
  require_verification: true
  use_as_login_identifier: true

email_delivery:
  enabled: true
  from_address: noreply@thunderlite.local
  from_name: ThunderLite (dev)
  smtp:
    host: mailpit
    port: '1025'

password:
  enabled: true
  optional: false
  min_length: 8

passkey:
  enabled: false

mfa:
  enabled: false

security_notifications:
  notifications:
    email_create: { enabled: false }
    email_delete: { enabled: false }
    password_update: { enabled: false }
    passkey_create: { enabled: false }
    primary_email_update: { enabled: false }
    mfa_create: { enabled: false }
    mfa_delete: { enabled: false }

audit_log:
  storage:
    enabled: false
